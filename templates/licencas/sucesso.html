{% extends 'base.html' %}
{% block title %}Pagamento Concluido | ERP Compras{% endblock %}
{% block content %}
<div class="mx-auto max-w-2xl rounded-2xl border border-emerald-500/40 bg-emerald-500/10 p-6">
  <h1 class="text-2xl font-black text-emerald-200">Pagamento confirmado</h1>
  <p class="mt-2 text-slate-200">Recebemos o checkout. A ativacao final ocorre via webhook Stripe.</p>
  {% if session_id %}<p class="mt-2 text-xs text-slate-300">Session: {{ session_id }}</p>{% endif %}
  <a href="/dashboard/" class="mt-4 inline-flex rounded-lg bg-emerald-400 px-4 py-2 font-semibold text-slate-900">Voltar ao dashboard</a>
</div>
{% endblock %}
