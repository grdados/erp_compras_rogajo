{% extends 'base.html' %}
{% block title %}Renovar Licenca | ERP Compras{% endblock %}
{% block content %}
<div class="mx-auto max-w-2xl rounded-2xl border border-slate-700 bg-slate-900/70 p-6">
  <h1 class="text-2xl font-black">Renovar Licenca</h1>
  <p class="mt-2 text-slate-300">Finalize a assinatura para manter o acesso do cliente ativo.</p>
  <form method="post" class="mt-6">
    {% csrf_token %}
    <button type="submit" class="rounded-lg bg-emerald-400 px-5 py-3 font-bold text-slate-900">Ir para checkout Stripe</button>
  </form>
</div>
{% endblock %}
