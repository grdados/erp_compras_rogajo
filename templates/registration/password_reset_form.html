{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Recuperar Senha | Rogajo</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#010707] text-white">
  <main class="relative flex min-h-screen items-center justify-center overflow-hidden px-4">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_20%_30%,rgba(100,210,111,0.25),transparent_35%),radial-gradient(circle_at_85%_75%,rgba(35,107,67,0.22),transparent_30%),linear-gradient(120deg,#010707_10%,#143f29_60%,#010707_100%)]"></div>
    <div class="relative w-full max-w-md rounded-3xl border border-white/15 bg-white/10 p-8 shadow-2xl backdrop-blur">
      <h1 class="text-3xl font-bold">Recuperar senha</h1>
      <p class="mt-2 text-sm text-slate-200">Informe seu e-mail para receber o link de redefinicao.</p>
      <form method="post" class="mt-6 space-y-4">
        {% csrf_token %}
        <div>
          <label class="mb-2 block text-sm font-semibold text-slate-200">Email</label>
          <input type="email" name="email" required class="w-full rounded-xl border border-white/20 bg-black/25 px-4 py-3 text-base placeholder:text-slate-400 focus:outline-none" placeholder="seuemail@dominio.com" />
        </div>
        <button type="submit" class="w-full rounded-xl bg-[#64d26f] px-5 py-3 text-base font-bold text-[#10301e] transition hover:bg-[#79df83]">Enviar link</button>
        <a href="/accounts/login/" class="inline-flex w-full items-center justify-center rounded-xl border border-white/20 bg-white/10 px-5 py-3 text-base font-bold text-white transition hover:bg-white/15">Voltar ao login</a>
      </form>
    </div>
  </main>
</body>
</html>
