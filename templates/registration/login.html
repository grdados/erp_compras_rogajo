{% extends 'base.html' %}
{% block title %}Login | ERP Compras{% endblock %}
{% block content %}
<div class="mx-auto max-w-md rounded-2xl border border-slate-700 bg-slate-900/70 p-6">
  <h1 class="text-2xl font-black">Acesso ao ERP</h1>
  <p class="mt-2 text-sm text-slate-300">Entre com seu usuario e senha para acessar o dashboard.</p>
  <form method="post" class="mt-6 space-y-4">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div>
      <label class="mb-1 block text-sm text-slate-300">Usuario</label>
      <input type="text" name="username" class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" required />
    </div>
    <div>
      <label class="mb-1 block text-sm text-slate-300">Senha</label>
      <input type="password" name="password" class="w-full rounded-lg border border-slate-700 bg-slate-950 px-3 py-2" required />
    </div>
    <button type="submit" class="w-full rounded-lg bg-emerald-400 px-4 py-2 font-bold text-slate-900">Entrar</button>
  </form>
</div>
{% endblock %}
