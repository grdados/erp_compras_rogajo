{% load static %}
<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Email enviado | Rogajo</title><script src="https://cdn.tailwindcss.com"></script></head>
<body class="min-h-screen bg-[#010707] text-white">
  <main class="relative flex min-h-screen items-center justify-center overflow-hidden px-4">
    <div class="absolute inset-0 bg-[radial-gradient(circle_at_20%_30%,rgba(100,210,111,0.25),transparent_35%),radial-gradient(circle_at_85%_75%,rgba(35,107,67,0.22),transparent_30%),linear-gradient(120deg,#010707_10%,#143f29_60%,#010707_100%)]"></div>
    <div class="relative w-full max-w-md rounded-3xl border border-white/15 bg-white/10 p-8 shadow-2xl backdrop-blur text-center">
      <h1 class="text-3xl font-bold">Email enviado</h1>
      <p class="mt-3 text-sm text-slate-200">Se o email existir, enviamos o link de redefinicao de senha.</p>
      <a href="/accounts/login/" class="mt-6 inline-flex w-full items-center justify-center rounded-xl border border-white/20 bg-white/10 px-5 py-3 text-base font-bold text-white transition hover:bg-white/15">Voltar ao login</a>
    </div>
  </main>
</body>
</html>
