<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}ERP Compras{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body class="min-h-screen bg-slate-950 text-slate-100">
    <header class="border-b border-slate-800 bg-slate-900/70 backdrop-blur">
      <div class="mx-auto flex max-w-6xl items-center justify-between px-6 py-4">
        <a href="/" class="text-lg font-extrabold tracking-wide">ERP Compras</a>
        <nav class="flex items-center gap-3 text-sm">
          {% if user.is_authenticated %}
            <a href="/dashboard/" class="rounded-lg border border-slate-700 px-3 py-1 hover:bg-slate-800">Dashboard</a>
            <a href="/licencas/renovar/" class="rounded-lg border border-emerald-500/40 px-3 py-1 text-emerald-300 hover:bg-emerald-500/10">Licenca</a>
            <a href="/accounts/logout/" class="rounded-lg border border-slate-700 px-3 py-1 hover:bg-slate-800">Sair</a>
          {% else %}
            <a href="/accounts/login/" class="rounded-lg border border-slate-700 px-3 py-1 hover:bg-slate-800">Entrar</a>
          {% endif %}
        </nav>
      </div>
    </header>

    <main class="mx-auto w-full max-w-6xl px-6 py-10">
      {% if messages %}
        <div class="mb-6 space-y-3">
          {% for message in messages %}
            <div class="rounded-xl border border-slate-700 bg-slate-900 px-4 py-3 text-sm">{{ message }}</div>
          {% endfor %}
        </div>
      {% endif %}
      {% block content %}{% endblock %}
    </main>
  </body>
</html>
