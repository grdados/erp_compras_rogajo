<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Salvo</title>
    <style>
      body { font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; padding: 18px; }
      .card { max-width: 520px; margin: 0 auto; border: 1px solid #e2e8f0; border-radius: 12px; padding: 14px; background: #fff; }
      .title { font-weight: 700; margin: 0 0 6px; }
      .muted { color: #475569; margin: 0 0 14px; font-size: 14px; }
      .btn { display: inline-flex; align-items: center; justify-content: center; border-radius: 10px; border: 1px solid #cbd5e1; padding: 8px 12px; background: #f8fafc; cursor: pointer; }
      .btn:hover { background: #f1f5f9; }
      code { background: #f1f5f9; padding: 2px 6px; border-radius: 8px; }
    </style>
  </head>
  <body>
    <div class="card">
      <p class="title">Registro salvo com sucesso.</p>
      <p class="muted">Voltando para o formulário e atualizando as listas automaticamente.</p>
      <button class="btn" type="button" onclick="window.close()">Fechar</button>
    </div>

    <script>
      (function () {
        try {
          var payload = JSON.parse('{{ payload_json|escapejs }}');
          if (payload && payload.type) {
            if (window.opener) {
              window.opener.postMessage(payload, window.location.origin);
            }
            if (window.parent && window.parent !== window) {
              window.parent.postMessage(payload, window.location.origin);
            }
          }
        } catch (e) {}

        // Try to close automatically (some browsers may block).
        try { window.close(); } catch (e) {}
      })();
    </script>
  </body>
</html>
