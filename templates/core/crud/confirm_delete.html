{% extends 'base.html' %}
{% block title %}Excluir | ERP Compras{% endblock %}
{% block content %}
<section class="mx-auto max-w-xl space-y-6">
  <div class="rounded-2xl border border-red-300/30 bg-red-500/10 p-5">
    <h1 class="text-2xl font-black text-red-200">Confirmar exclusao</h1>
    <p class="mt-2 text-sm text-slate-200">Tem certeza que deseja excluir <strong>{{ object }}</strong>?</p>
  </div>

  <form method="post" class="flex gap-3">
    {% csrf_token %}
    <button type="submit" class="rounded-lg bg-red-400 px-4 py-2 text-sm font-bold text-red-950">Excluir</button>
    <a href="javascript:history.back()" class="rounded-lg border border-white/20 px-4 py-2 text-sm">Cancelar</a>
  </form>
</section>
{% endblock %}
