{% extends "base.html" %}
{% block title %}Convite Enviado | ERP Compras{% endblock %}

{% block content %}
<section class="space-y-5">
  <div class="rounded-3xl border border-slate-200 bg-white p-6">
    <h1 class="text-[18px] font-bold text-slate-900">Convite Gerado</h1>
    <p class="mt-1 text-[14px] font-normal text-slate-600">Copie e envie a mensagem para o usuario.</p>
  </div>

  <div class="rounded-2xl border border-slate-200 bg-white p-5">
    <div class="flex flex-wrap items-center justify-between gap-3">
      <div class="text-[14px] font-normal text-slate-700">
        Usuario: <span class="font-bold">{{ username }}</span>
      </div>
      <div class="flex items-center gap-2">
        <button type="button" id="copy-btn" class="rounded-lg bg-[var(--accent)] px-4 py-2 text-[14px] font-bold text-emerald-950 hover:brightness-95">Copiar mensagem</button>
        <a href="{% url 'core:licenca_vinculo_list' %}" class="rounded-lg border border-slate-300 bg-white px-4 py-2 text-[14px] font-bold text-slate-800 hover:bg-slate-100">Voltar</a>
      </div>
    </div>

    <div class="mt-4">
      <textarea id="invite-msg" rows="9" class="w-full rounded-xl border border-slate-300 bg-slate-50 px-3 py-2 text-[14px] text-slate-800">{{ mensagem }}</textarea>
      <div id="copy-ok" class="mt-2 hidden rounded-lg border border-emerald-200 bg-emerald-50 px-3 py-2 text-[14px] font-normal text-emerald-900">Mensagem copiada.</div>
    </div>

    {% if whatsapp_url %}
      <div class="mt-3">
        <a href="{{ whatsapp_url }}" target="_blank" rel="noreferrer" class="inline-flex items-center rounded-lg border border-slate-300 bg-white px-4 py-2 text-[14px] font-bold text-slate-800 hover:bg-slate-100">Abrir WhatsApp Web</a>
      </div>
    {% endif %}
  </div>
</section>

<script>
(function(){
  const btn = document.getElementById('copy-btn');
  const ta = document.getElementById('invite-msg');
  const ok = document.getElementById('copy-ok');
  if(!btn || !ta) return;

  btn.addEventListener('click', async function(){
    try {
      await navigator.clipboard.writeText(ta.value);
    } catch (e) {
      ta.focus();
      ta.select();
      document.execCommand('copy');
    }
    if(ok){ ok.classList.remove('hidden'); setTimeout(() => ok.classList.add('hidden'), 2000); }
  });
})();
</script>
{% endblock %}
